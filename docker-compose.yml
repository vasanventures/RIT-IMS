version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ims-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ims_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ims-network

  redis:
    image: redis:7.0-alpine
    container_name: ims-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ims-network

volumes:
  mysql_data:
  redis_data:

networks:
  ims-network:
    driver: bridge
